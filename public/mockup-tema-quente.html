<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mockup - Sete Ecos v3</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --marfim: #FAF6F0;
            --marfim-quente: #F5EEE3;
            --dourado: #C9A227;
            --dourado-claro: #E8D5A3;
            --texto: #4A3728;
            --texto-suave: #6B5344;
            --lumina-lavanda: #9B8AA6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--marfim);
            min-height: 100vh;
            color: var(--texto);
            padding-bottom: 100px;
        }

        /* ===== MOCKUP BADGE ===== */
        .mockup-badge {
            position: fixed;
            top: 10px;
            right: 10px;
            background: var(--dourado);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(201, 162, 39, 0.4);
        }

        /* ===== HERO ===== */
        .hero {
            width: 100%;
            height: 280px;
            background: url('/logos/SETEECOS_HERO.png') center center / cover no-repeat;
            position: relative;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 100px;
            background: linear-gradient(to bottom, transparent, var(--marfim));
        }

        /* ===== LUMINA CARD ===== */
        .lumina-section {
            padding: 0 20px;
            margin-top: -50px;
            position: relative;
            z-index: 10;
        }

        .lumina-card {
            background: linear-gradient(135deg, #B8A5C4 0%, var(--lumina-lavanda) 100%);
            border-radius: 20px;
            padding: 18px 22px;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 8px 30px rgba(155, 138, 166, 0.35);
            cursor: pointer;
            max-width: 380px;
            margin: 0 auto;
        }

        .lumina-card img {
            width: 55px;
            height: 55px;
            object-fit: contain;
        }

        .lumina-card h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.3rem;
            color: #FFF;
            letter-spacing: 0.12em;
        }

        .lumina-card p {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.85);
        }

        .lumina-arrow {
            margin-left: auto;
            font-size: 1.4rem;
            color: rgba(255,255,255,0.7);
        }

        /* ===== SECTION TITLE ===== */
        .section-title {
            text-align: center;
            padding: 35px 20px 15px;
        }

        .section-title h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 0.3em;
            color: var(--texto-suave);
            text-transform: uppercase;
        }

        /* ===== FLOR DOS 7 ECOS - CIRCULAR PERFEITO ===== */
        .flor-wrapper {
            display: flex;
            justify-content: center;
            padding: 10px 20px 30px;
        }

        .flor-container {
            position: relative;
            width: 320px;
            height: 320px;
        }

        /* Centro da flor */
        .flor-centro {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            z-index: 10;
        }

        .flor-centro img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 25px rgba(201, 162, 39, 0.5));
        }

        /* Pétalas - posicionadas em círculo perfeito */
        .petala {
            position: absolute;
            width: 75px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .petala:hover {
            transform: scale(1.08);
        }

        .petala img {
            width: 65px;
            height: 65px;
            object-fit: contain;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.15));
        }

        .petala-label {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--texto-suave);
            margin-top: 3px;
            text-align: center;
        }

        /* 7 pétalas em círculo - 360°/7 = 51.43° cada
           Raio: 115px do centro (160,160) */

        .petala-1 { /* VITALIS - 270° (topo) */
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
        }
        .petala-1:hover { transform: translateX(-50%) scale(1.08); }

        .petala-2 { /* AUREA - 321.43° */
            top: 30px;
            right: 20px;
        }

        .petala-3 { /* SERENA - 12.86° */
            top: 120px;
            right: -5px;
        }

        .petala-4 { /* IGNIS - 64.29° */
            bottom: 35px;
            right: 35px;
        }

        .petala-5 { /* VENTIS - 115.71° */
            bottom: 35px;
            left: 35px;
        }

        .petala-6 { /* ECOA - 167.14° */
            top: 120px;
            left: -5px;
        }

        .petala-7 { /* IMAGO - 218.57° */
            top: 30px;
            left: 20px;
        }

        /* Badge */
        .badge {
            position: absolute;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.5rem;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 6px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .badge.disponivel {
            background: #5D7A3A;
            color: white;
        }

        .badge.breve {
            background: rgba(201, 162, 39, 0.15);
            color: var(--dourado);
            border: 1px solid var(--dourado-claro);
        }

        /* ===== AURORA SECTION ===== */
        .aurora-section {
            margin-top: 20px;
            padding: 30px 20px 40px;
            background: linear-gradient(180deg, var(--marfim) 0%, rgba(232, 213, 163, 0.15) 50%, rgba(212, 165, 165, 0.1) 100%);
            text-align: center;
            position: relative;
        }

        .aurora-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--dourado), transparent);
        }

        .aurora-section img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-bottom: 14px;
            filter: drop-shadow(0 0 20px rgba(201, 162, 39, 0.35));
        }

        .aurora-section h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.4rem;
            font-weight: 400;
            letter-spacing: 0.25em;
            color: var(--dourado);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .aurora-section .subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.9rem;
            font-style: italic;
            color: var(--texto-suave);
            margin-bottom: 20px;
        }

        .progress-container {
            max-width: 260px;
            margin: 0 auto;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--texto-suave);
            margin-bottom: 8px;
        }

        .progress-track {
            height: 6px;
            background: rgba(201, 162, 39, 0.12);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 14%;
            background: linear-gradient(90deg, #D4A5A5, var(--dourado));
            border-radius: 3px;
        }

        /* ===== BOTTOM NAV ===== */
        .nav-bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(250, 246, 240, 0.97);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--dourado-claro);
            padding: 12px 20px 24px;
            display: flex;
            justify-content: space-around;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            text-decoration: none;
            color: var(--texto-suave);
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .nav-item.active {
            color: var(--dourado);
        }

        .nav-icon {
            font-size: 1.2rem;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .lumina-card { animation: fadeIn 0.5s ease-out 0.1s both; }
        .flor-container { animation: fadeIn 0.5s ease-out 0.2s both; }
        .aurora-section { animation: fadeIn 0.5s ease-out 0.3s both; }
    </style>
</head>
<body>

    <div class="mockup-badge">MOCKUP v3</div>

    <!-- HERO -->
    <section class="hero"></section>

    <!-- LUMINA -->
    <section class="lumina-section">
        <div class="lumina-card">
            <img src="/logos/lumina-logo_v2.png" alt="Lumina">
            <div>
                <h2>LUMINA</h2>
                <p>O espelho interior — Check-in diário</p>
            </div>
            <span class="lumina-arrow">→</span>
        </div>
    </section>

    <!-- OS 7 ECOS -->
    <section class="section-title">
        <h3>Os Sete Caminhos</h3>
    </section>

    <div class="flor-wrapper">
        <div class="flor-container">

            <!-- Centro -->
            <div class="flor-centro">
                <img src="/logos/CENTRO_7ECOS.png" alt="Tu">
            </div>

            <!-- VITALIS - Topo -->
            <div class="petala petala-1">
                <img src="/logos/VITALIS_LOGO_V3.png" alt="Vitalis">
                <span class="petala-label">Vitalis</span>
                <span class="badge disponivel">Aberto</span>
            </div>

            <!-- AUREA -->
            <div class="petala petala-2">
                <img src="/logos/AUREA_LOGO_V3.png" alt="Aurea">
                <span class="petala-label">Aurea</span>
                <span class="badge breve">Breve</span>
            </div>

            <!-- SERENA -->
            <div class="petala petala-3">
                <img src="/logos/SERENA_LOGO_V3.png" alt="Serena">
                <span class="petala-label">Serena</span>
                <span class="badge breve">Breve</span>
            </div>

            <!-- IGNIS -->
            <div class="petala petala-4">
                <img src="/logos/IGNIS-LOGO-V3.png" alt="Ignis">
                <span class="petala-label">Ignis</span>
                <span class="badge breve">Breve</span>
            </div>

            <!-- VENTIS -->
            <div class="petala petala-5">
                <img src="/logos/VENTIS_LOGO_V3.png" alt="Ventis">
                <span class="petala-label">Ventis</span>
                <span class="badge breve">Breve</span>
            </div>

            <!-- ECOA -->
            <div class="petala petala-6">
                <img src="/logos/ECOA_LOGO_V3.png" alt="Ecoa">
                <span class="petala-label">Ecoa</span>
                <span class="badge breve">Breve</span>
            </div>

            <!-- IMAGO -->
            <div class="petala petala-7">
                <img src="/logos/IMAGO_LOGO_V3.png" alt="Imago">
                <span class="petala-label">Imago</span>
                <span class="badge breve">Breve</span>
            </div>

        </div>
    </div>

    <!-- AURORA -->
    <section class="aurora-section">
        <img src="/logos/AURORA_LOGO_V3.png" alt="Aurora">
        <h2>Aurōra</h2>
        <p class="subtitle">A Coroação — Presença plena</p>
        <div class="progress-container">
            <div class="progress-info">
                <span>A tua jornada</span>
                <span>1 de 7</span>
            </div>
            <div class="progress-track">
                <div class="progress-bar"></div>
            </div>
        </div>
    </section>

    <!-- NAVIGATION -->
    <nav class="nav-bottom">
        <a href="#" class="nav-item active">
            <span class="nav-icon">🏠</span>
            <span>Início</span>
        </a>
        <a href="#" class="nav-item">
            <span class="nav-icon">👁️</span>
            <span>Lumina</span>
        </a>
    </nav>

</body>
</html>
