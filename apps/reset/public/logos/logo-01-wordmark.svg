<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" fill="#F6F1E8"/>

  <!-- Hairline arc · phoenix wing rising -->
  <path d="M 290 410 Q 360 280 512 230 Q 664 280 734 410"
